commissions:
  - nom: Commission sportive
    description: |-
      Gestion du matériel, créneaux et logistique des entraînements et matchs
      Organisation et suivi des plannings de matchs et tâches
      Formation et suivi des arbitres
      Suivi des besoins des équipes et des labels fédéraux
    email: technique@sehc.fr
    icone: whistle
  - nom: Commission partenaires
    description: |-
      Recherche et fidélisation des partenaires
      Mise en place des contreparties (visibilité, invitations...)
      Création de liens durables avec les sponsors
    email: partenaires@sehc.fr
    icone: store
  - nom: Commission communication
    description: |-
      Animation des réseaux sociaux, site web et visuels
      Communication interne avec les licenciés et les familles
      Relations presse et valorisation des actions du club
    email: communication@sehc.fr
    icone: communication
  - nom: Commission discipline
    description: |-
      Application du règlement intérieur
      Gestion des conflits ou comportements inadaptés
      Suivi des sanctions internes ou fédérales
    email: president@sehc.fr
    icone: discipline
  - nom: Commission animations
    description: >-
      Organisation des événements festifs (Loto, Beach Handball, Arbre de
      Noël...)

      Gestion de la buvette (approvisionnement, service, organisation...)
    email: animations@sehc.fr
    icone: beer
